# Build Poetry’siz: requirements.txt orqali pip install (Dokploy/Nixpacks default Poetry 1.3.1 lock faylni buzadi).
# requirements.txt yangilash: poetry export -f requirements.txt --without-hashes --only main

[phases.setup]
nixPkgs = ["python3"]

[phases.install]
cmds = [
  "apt-get update && apt-get install -y --no-install-recommends ca-certificates curl gnupg",
  "install -d /usr/share/postgresql-common/pgdg",
  "curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg",
  ". /etc/os-release && echo \"deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.gpg] http://apt.postgresql.org/pub/repos/apt ${VERSION_CODENAME}-pgdg main\" > /etc/apt/sources.list.d/pgdg.list",
  "apt-get update && apt-get install -y --no-install-recommends postgresql-client-18",
  "ln -sf /usr/lib/postgresql/18/bin/pg_dump /usr/local/bin/pg_dump",
  "pg_dump --version",
  "rm -rf /var/lib/apt/lists/*",
  "python3 -m venv --copies /opt/venv",
  ". /opt/venv/bin/activate && pip install --upgrade pip",
  ". /opt/venv/bin/activate && pip install --cache-dir /app/.cache/pip -r requirements.txt",
  "chmod +x start.sh"
]

[start]
cmd = "bash /app/start.sh"

[cache]
paths = ["/app/.cache/pip"]
