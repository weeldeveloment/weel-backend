name: Backend CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-test-secret-key
      DJANGO_SETTINGS_MODULE: core.test_settings
      PYTHONWARNINGS: ignore::Warning:requests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Django system checks
        run: python manage.py check --settings=core.test_settings

      - name: Run automated tests
        run: python manage.py test users shared payment property stories booking notification bot sanatorium chat admin_auth --settings=core.test_settings
